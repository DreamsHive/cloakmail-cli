name: Publish

# Triggered by pushing a `v*` tag (e.g. `v1.0.0`) or manually via the
# Actions UI. Re-runs the full test suite as a safety net, then publishes
# cloakmail-cli to npm with provenance attestation.
#
# Before tagging, make sure `package.json` version and the v-tag match.

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.0)"
        required: true

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest

    # `id-token: write` is required for npm provenance attestation.
    # `contents: write` is required for the GitHub Release step at the bottom.
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # We use `bun install` for speed but `npm publish` for the actual
      # release because npm CLI is the only client that supports the
      # `--provenance` flag against the public registry today.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          pkg_version=$(node -p "require('./package.json').version")
          expected="v${pkg_version}"
          if [ "$tag" != "$expected" ]; then
            echo "Tag mismatch: tag is '$tag' but package.json says '$expected'"
            exit 1
          fi
          echo "Publishing $tag (package.json: $pkg_version)"

      - name: Check if version is already published
        id: check
        run: |
          pkg_name=$(node -p "require('./package.json').name")
          pkg_version=$(node -p "require('./package.json').version")
          if npm view "${pkg_name}@${pkg_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${pkg_name}@${pkg_version} is already published, skipping"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.already_published != 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Auto-generated release notes from merged PRs since the previous tag.
      # Skipped on manual workflow_dispatch runs because there's no implicit
      # tag context to anchor the notes against.
      - name: Create GitHub Release
        if: ${{ !inputs.tag }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
